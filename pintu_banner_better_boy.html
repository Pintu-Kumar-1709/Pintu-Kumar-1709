
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Syne',sans-serif;}
.wrap{display:flex;flex-direction:column;align-items:flex-start}
.preview-label{font-size:10px;letter-spacing:2px;color:#3a4255;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:12px}
.banner{width:860px;height:400px;background:#0d0d0d;border-radius:20px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;padding:50px 55px;}
.banner::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(240,219,79,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,219,79,0.03) 1px,transparent 1px);background-size:40px 40px;}
.banner::after{content:'';position:absolute;top:-80px;right:180px;width:420px;height:420px;background:radial-gradient(circle,rgba(240,219,79,0.07) 0%,transparent 65%);pointer-events:none;}
.left{position:relative;z-index:2;flex:1}
.greeting{font-size:13px;font-family:'JetBrains Mono',monospace;color:#484f58;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.greeting span{color:#f0db4f}
.name-hi{color:#484f58;font-weight:400;font-size:42px;font-family:'Syne',sans-serif}
.name-pintu{color:#f0db4f;display:block;font-size:62px;font-weight:800;letter-spacing:-2px;font-family:'Syne',sans-serif;line-height:1}
.role-line{margin-top:14px;display:flex;align-items:center;gap:8px}
.role-dot{width:6px;height:6px;border-radius:50%;background:#f0db4f;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.role-text{font-size:18px;color:#8b949e;font-weight:400}
.role-text b{color:#e6edf3;font-weight:600}
.tagline{margin-top:8px;font-size:11px;color:#3a4255;font-family:'JetBrains Mono',monospace}
.handle{margin-top:18px;display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;background:#f0db4f12;border:1px solid #f0db4f33;font-size:12px;color:#f0db4f;font-family:'JetBrains Mono',monospace}
.right{position:relative;width:340px;height:380px;flex-shrink:0;z-index:2;display:flex;align-items:flex-end;justify-content:center}
.circle-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,#f0db4f15 0%,transparent 70%);border:1px solid #f0db4f18}

/* tech logos */
.tech{position:absolute;width:38px;height:38px;border-radius:10px;background:#111823;border:1px solid #1c2030;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.tech:nth-child(odd){animation:float1 3s ease-in-out infinite}
.tech:nth-child(even){animation:float2 3.5s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes float2{0%,100%{transform:translateY(-4px)}50%{transform:translateY(4px)}}
.t1{top:15px;left:15px}.t2{top:15px;right:15px}.t3{top:85px;left:0px}.t4{top:85px;right:0px}.t5{top:160px;left:8px}.t6{top:160px;right:8px}.t7{bottom:80px;left:25px}.t8{bottom:80px;right:25px}

.dl-btn{margin-top:14px;display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:8px;background:#f0db4f;color:#0d0d0d;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;border:none;letter-spacing:0.5px;transition:all .2s}
.dl-btn:hover{background:#e3cc3a;transform:translateY(-1px)}
</style>
</head>
